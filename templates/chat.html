<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namma Mkce - Premium Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/new_styles.css') }}">
</head>
<body class="copilot-home">
    <!-- Premium Sidebar -->
    <aside class="premium-sidebar" id="sidebar">
        <!-- Top Section: Logo & Collapse Toggle -->
        <div class="sidebar-header">
            <div class="brand-logo">
                <img src="https://almashines.s3.dualstack.ap-southeast-1.amazonaws.com/assets/images/cover/1283.jpg?r=1" alt="Namma Mkce Logo" class="logo-image-full">
                <span class="brand-text-below">Namma Mkce</span>
            </div>
            <button class="collapse-toggle" id="sidebar-collapse-btn" title="Collapse sidebar">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <!-- Menu Items -->
        <div class="sidebar-menu">
            <button class="menu-item active" data-action="new-chat">
                <i class="fas fa-plus-circle"></i>
                <span>New Chat</span>
            </button>
        </div>

        <!-- Recent Chats Section -->
        <div class="recent-chats-section">
            <div class="section-label">Recent Chats</div>
            <div class="recent-chats-list" id="recent-chats-list">
                <!-- Dynamic chat items will appear here -->
            </div>
        </div>

        <!-- Bottom Section: User Profile -->
        <div class="sidebar-footer">
            <button class="user-profile-btn" id="user-profile-btn">
                <div class="profile-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <div class="profile-info">
                    <span class="profile-name" id="profile-name">{{ session.get('user', 'Guest User') }}</span>
                    <span class="profile-status">Logged in</span>
                </div>
            </button>
            <button class="sign-in-btn d-none" id="sign-in-btn">
                <i class="fas fa-sign-in-alt"></i>
                <span>Sign In</span>
            </button>
            <button class="sign-out-btn" id="sign-out-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Sign Out</span>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content-wrapper" id="main-content">
        <div class="content-container">
            <!-- Home Pane -->
            <section id="home-pane" class="home-pane fade-in">
                <div class="welcome-section">
                    <h1 class="welcome-title">Welcome! I'm your Campus Guide Assistant</h1>
                    <p class="welcome-subtitle">Ask me anything about campus life, student services, or academic guidance.</p>
                </div>

                <!-- Premium Input Box -->
                <div class="premium-input-container">
                    <div class="input-wrapper">
                        <span class="input-icon-left">
                            <i class="fas fa-plus"></i>
                        </span>
                        <select class="language-selector" id="home-language-selector" aria-label="Select language">
                            <option value="english">English</option>
                            <option value="tamil">Tamil</option>
                            <option value="hindi">Hindi</option>
                        </select>
                        <input 
                            type="text" 
                            id="home-message-input" 
                            class="premium-input" 
                            placeholder="Ask anything..." 
                            aria-label="Ask anything"
                        >
                        <button class="voice-btn" id="home-voice-btn" title="Voice input">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button class="send-btn-primary" id="home-send-btn" title="Send message">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                </div>

                <!-- Suggestion Buttons -->
                <div class="suggestions-grid" id="suggestions">
                    <button class="suggestion-pill" data-suggestion="How do I reset my password?">
                        <i class="fas fa-key"></i>
                        <span>Reset password</span>
                    </button>
                    <button class="suggestion-pill" data-suggestion="Show me the latest campus announcements.">
                        <i class="fas fa-bullhorn"></i>
                        <span>Campus announcements</span>
                    </button>
                    <button class="suggestion-pill" data-suggestion="What are exam policies for semester 2?">
                        <i class="fas fa-file-alt"></i>
                        <span>Exam policies</span>
                    </button>
                    <button class="suggestion-pill" data-suggestion="Give me tips for final year project planning.">
                        <i class="fas fa-lightbulb"></i>
                        <span>Project tips</span>
                    </button>
                </div>

                <div class="footer-note">
                    <small><i class="fas fa-info-circle"></i> Start with a quick question or explore suggested prompts.</small>
                </div>
            </section>

            <!-- Chat Pane -->
            <section id="chat-pane" class="chat-pane d-none fade-in">
                <div class="chat-messages-container" id="chat-messages">
                    <!-- Messages will appear here -->
                </div>
                
                <div id="typing-indicator" class="typing-indicator-wrapper d-none">
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span class="typing-text">AI is thinking...</span>
                </div>

                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <span class="input-icon-left">
                            <i class="fas fa-plus"></i>
                        </span>
                        <select class="language-selector" id="chat-language-selector" aria-label="Select language">
                            <option value="english">English</option>
                            <option value="tamil">Tamil</option>
                            <option value="hindi">Hindi</option>
                        </select>
                        <input 
                            type="text" 
                            id="message-input" 
                            class="premium-input" 
                            placeholder="Type your message..." 
                            aria-label="Type your message"
                        >
                        <button class="voice-btn" id="voice-btn" title="Voice input">
                            <i class="fas fa-microphone"></i>
                        </button>
                        <button class="send-btn-primary" id="send-btn" title="Send message">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                    <div class="chat-action-row">
                        <button class="share-chat-btn" id="share-chat-btn" title="Share this conversation">
                            <i class="fas fa-share-alt"></i>
                            <span>Share chat</span>
                        </button>
                        <button class="clear-chat-btn" id="clear-chat-btn" title="Clear conversation">
                            <i class="fas fa-trash-alt"></i>
                            <span>Clear chat</span>
                        </button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Dark Mode Toggle -->
    <button id="dark-mode-toggle" class="dark-mode-toggle" title="Toggle dark mode">
        <i class="fas fa-moon"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
