<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Namma Mkce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-page">
    <div class="login-bg-stage" aria-hidden="true">
        <video class="login-bg-video" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-video-of-colorful-liquid-forms-467-large.mp4" type="video/mp4">
        </video>
        <div class="login-bg-overlay"></div>
    </div>

    <div class="container login-shell d-flex justify-content-center align-items-center vh-100">
        <div class="card login-card shadow-lg" style="width: 100%; max-width: 440px;">
            <div class="card-body p-5">
                <h3 class="card-title login-title text-center mb-4">User Login</h3>
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="alert alert-danger login-alert">{{ messages[0] }}</div>
                    {% endif %}
                {% endwith %}
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label login-label">Username</label>
                        <input type="text" class="form-control login-input" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label login-label">Password</label>
                        <input type="password" class="form-control login-input" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn login-submit-btn w-100">Login</button>
                </form>
                <p class="text-center mt-3 mb-0 login-meta-text">
                    New user? <a href="{{ url_for('signup') }}">Create account</a>
                </p>
                <p class="text-center mt-2 mb-0 login-meta-text">
                    <a href="{{ url_for('admin_login') }}">Admin login</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        (function () {
            const root = document.body;
            root.addEventListener('pointermove', (event) => {
                const x = (event.clientX / window.innerWidth) * 100;
                const y = (event.clientY / window.innerHeight) * 100;
                root.style.setProperty('--pointer-x', `${x}%`);
                root.style.setProperty('--pointer-y', `${y}%`);
            });
        })();
    </script>
</body>
</html>
